# =============================================================================
# Sarfat Load Testing Platform — Control Plane (Kubernetes)
# Deployment + Service + Ingress + ConfigMap + Secret reference
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: sarfat-control-plane-config
  namespace: sarfat
  labels:
    app.kubernetes.io/name: sarfat-control-plane
    app.kubernetes.io/part-of: sarfat-load-testing
data:
  NODE_ENV: "production"
  PORT: "3006"
  NATS_URL: "nats://sarfat-nats:4222"
  REDIS_URL: "redis://sarfat-redis:6379"
  LOG_LEVEL: "info"
  EVIDENCE_STORE_BUCKET: "sarfat-evidence"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sarfat-control-plane
  namespace: sarfat
  labels:
    app.kubernetes.io/name: sarfat-control-plane
    app.kubernetes.io/part-of: sarfat-load-testing
    app.kubernetes.io/version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sarfat-control-plane
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sarfat-control-plane
        app.kubernetes.io/part-of: sarfat-load-testing
    spec:
      serviceAccountName: sarfat-control-plane
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: control-plane
          image: ghcr.io/sarfat/control-plane:2.0.0
          ports:
            - name: http
              containerPort: 3006
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sarfat-control-plane-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sarfat-secrets
                  key: database-url
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sarfat-secrets
                  key: anthropic-api-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sarfat-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sarfat-control-plane
  namespace: sarfat
  labels:
    app.kubernetes.io/name: sarfat-control-plane
    app.kubernetes.io/part-of: sarfat-load-testing
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sarfat-control-plane
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sarfat-control-plane
  namespace: sarfat
  labels:
    app.kubernetes.io/name: sarfat-control-plane
    app.kubernetes.io/part-of: sarfat-load-testing
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: sarfat-control-plane
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - load.sarfat.io
      secretName: sarfat-tls
  rules:
    - host: load.sarfat.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sarfat-control-plane
                port:
                  name: http
