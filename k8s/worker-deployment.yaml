# =============================================================================
# Sarfat Load Testing Platform — Worker Pool (Kubernetes)
# Deployment + HPA with anti-affinity, resource limits, region scheduling
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sarfat-worker
  namespace: sarfat
  labels:
    app.kubernetes.io/name: sarfat-worker
    app.kubernetes.io/part-of: sarfat-load-testing
    app.kubernetes.io/version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sarfat-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 5
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sarfat-worker
        app.kubernetes.io/part-of: sarfat-load-testing
    spec:
      serviceAccountName: sarfat-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: sarfat-worker
                topologyKey: kubernetes.io/hostname
      nodeSelector:
        sarfat.io/role: worker
        topology.kubernetes.io/region: us-east-1
      tolerations:
        - key: sarfat.io/worker
          operator: Exists
          effect: NoSchedule
      containers:
        - name: k6-worker
          image: ghcr.io/sarfat/k6-worker:2.0.0
          command: ["tini", "--", "sh", "-c", "while true; do sleep 3600; done"]
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WORKER_REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['topology.kubernetes.io/zone']
            - name: NATS_URL
              value: "nats://sarfat-nats:4222"
            - name: CONTROL_PLANE_URL
              value: "http://sarfat-control-plane"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: results
              mountPath: /results
      volumes:
        - name: results
          emptyDir:
            sizeLimit: 2Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sarfat-worker
  namespace: sarfat
  labels:
    app.kubernetes.io/name: sarfat-worker
    app.kubernetes.io/part-of: sarfat-load-testing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sarfat-worker
  minReplicas: 2
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 10
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
