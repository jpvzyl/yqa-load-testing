{{/*
=============================================================================
Sarfat Load Testing Platform — Control Plane Deployment (Helm template)
=============================================================================
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sarfat-load-testing.fullname" . }}-control-plane
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "sarfat-load-testing.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicaCount }}
  selector:
    matchLabels:
      {{- include "sarfat-load-testing.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "sarfat-load-testing.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sarfat-load-testing.fullname" . }}-control-plane
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: control-plane
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.env.PORT | default 3006 }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.controlPlane.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.controlPlane.env.PORT | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.controlPlane.env.LOG_LEVEL | quote }}
            - name: NATS_URL
              value: "nats://{{ include "sarfat-load-testing.fullname" . }}-nats:4222"
            - name: REDIS_URL
              value: "redis://{{ include "sarfat-load-testing.fullname" . }}-redis-master:6379"
            - name: EVIDENCE_STORE_BUCKET
              value: {{ .Values.evidenceStore.bucket | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.secrets.existingSecret }}
                  key: {{ .Values.controlPlane.secrets.databaseUrlKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.secrets.existingSecret }}
                  key: {{ .Values.controlPlane.secrets.anthropicApiKeyKey }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.secrets.existingSecret }}
                  key: {{ .Values.controlPlane.secrets.jwtSecretKey }}
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
